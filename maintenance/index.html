<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copa Mazorca de Oro · Mantenimiento</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4ff;
      font-family: system-ui, -apple-system, sans-serif;
      color: #1e293b;
    }
    .card {
      text-align: center;
      background: white;
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; font-weight: 700; color: #4f46e5; margin-bottom: 0.5rem; }
    p { font-size: 0.95rem; color: #64748b; line-height: 1.6; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      background: #e0e7ff;
      color: #4338ca;
      border-radius: 999px;
      padding: 0.35rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚽</div>
    <h1>Copa Mazorca de Oro</h1>
    <p>Estamos realizando tareas de mantenimiento.<br>Volvemos en unos minutos.</p>
    <span class="badge">Volvemos pronto</span>
  </div>
</body>
</html>
